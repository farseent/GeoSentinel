services:
  mongo:
    image: mongo:7
    container_name: geosentinel-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  model:
    image: farseen247/geosentinel-model:latest
    container_name: geosentinel-model
    restart: unless-stopped
    ports:
      - "5001:5001"

  server:
    image: farseen247/geosentinel-server:latest
    container_name: geosentinel-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/geosentinel
      - MODEL_API_URL=http://model:5001
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
      - model

  client:
    image: farseen247/geosentinel-client:latest
    container_name: geosentinel-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_BACKEND_URL=http://localhost:5000
    depends_on:
      - server

volumes:
  mongo-data:
